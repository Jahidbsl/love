<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Love Proposal</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        .moved {
            position: absolute !important;
            transition: all 0.0s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }
        .interaction-area {
            height: 350px;
            position: relative;
            width: 100%;
        }
        #yes-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-200 to-purple-200 flex items-center justify-center min-h-screen p-4">

    <div class="card w-96 bg-base-100 shadow-2xl border-4 border-white rounded-[2.5rem] overflow-hidden transform transition-all">
        <figure class="px-10 pt-10">
            <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZWlyZSZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute" class="w-48 h-48 object-contain" />
        </figure>
        
        <div class="card-body items-center text-center interaction-area">
            <h2 id="display-text" class="card-title text-2xl font-bold text-pink-700 mb-8 transition-all duration-300">Do you love me? 🥰</h2>
            
            <div id="btn-container" class="flex justify-center gap-4 w-full h-20 items-start">
                <button id="yes-btn" class="btn btn-secondary px-10 rounded-full shadow-lg text-lg border-none hover:bg-pink-600">Yes</button>
                <button id="no-btn" class="btn btn-outline btn-error px-10 rounded-full shadow-md text-lg">No</button>
            </div>
        </div>
    </div>

    <dialog id="success_modal" class="modal">
        <div class="modal-box text-center bg-white border-8 border-pink-100 rounded-3xl">
            <h3 class="font-black text-4xl text-pink-500 mb-4">Yay! I knew it! ❤️</h3>
            <p class="text-lg text-gray-500 italic">"I love you more than coding!"</p>
            <div class="modal-action justify-center">
                <form method="dialog">
                    <button class="btn btn-secondary rounded-full px-8">Love You Too!</button>
                </form>
            </div>
        </div>
    </dialog>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const displayText = document.getElementById('display-text');
        const mainGif = document.getElementById('main-gif');
        const container = document.querySelector('.interaction-area');

        // মজার কিছু মেসেজ
        const messages = [
            // "Are you sure? 😮",
            // "Jahid is sad now... 😢",
            // "Think again! 🧐",
            // "Don't do this to me! 💔",
            // "You're clicking the wrong one! ☝️",
            // "Is that a NO? No way! 🙅‍♂️"
        ];

        function moveButton() {
            if (!noBtn.classList.contains('moved')) {
                noBtn.classList.add('moved');
            }

            // বাটন সরানোর সাথে সাথে লেখা পরিবর্তন
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            displayText.innerText = randomMsg;
            displayText.classList.add('scale-110', 'text-red-500');
            
            // GIF পরিবর্তন (অপশনাল: চাইলে অন্য কোনো লিঙ্কে দিতে পারেন)
            // mainGif.src = "another_gif_url"; 

            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            const newLeft = Math.random() * (containerWidth - btnWidth);
            const newTop = Math.random() * (containerHeight - btnHeight);

            noBtn.style.left = newLeft + 'px';
            noBtn.style.top = newTop + 'px';

            setTimeout(() => {
                displayText.classList.remove('scale-110');
            }, 200);
        }

        // মাউস এবং টাচ ইভেন্ট
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // 'Yes' ক্লিক করলে কনফেটি ইফেক্ট
        yesBtn.addEventListener('click', () => {
            // কনফেটি লাঞ্চ করা
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff69b4', '#ff1493', '#ffffff']
            });

            document.getElementById('success_modal').showModal();
            displayText.innerText = "Do you love me? 🥰";
            displayText.classList.remove('text-red-500');
        });
    </script>
</body>
</html>
