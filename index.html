<!DOCTYPE html>
<html lang="en" data-theme="cupcake">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        .moved {
            position: absolute !important;
            transition: all 0.01s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        .interaction-area {
            height: 380px;
            position: relative;
            width: 100%;
            touch-action: none;
        }

        body {
            touch-action: pan-x pan-y;
        }
    </style>
</head>

<body class="bg-pink-100 flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="card w-full max-w-[350px] bg-base-100 shadow-2xl border-4 border-white rounded-[2.5rem] overflow-hidden">
        <figure class="px-10 pt-10">
            <img id="main-gif"
                src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZWlyZSZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif"
                alt="Cute" class="w-48 h-48 object-contain" />
        </figure>

        <div class="card-body items-center text-center interaction-area px-4">
            <h2 id="display-text" class="card-title text-2xl font-black text-pink-700 mb-6 min-h-[60px]">
                তুমি কি আমাকে ভালোবাসো? 🥰</h2>

            <div id="btn-container" class="flex justify-center gap-4 w-full h-20 items-start">
                <button id="yes-btn"
                    class="btn btn-secondary px-8 rounded-full shadow-lg text-lg border-none">হ্যাঁ</button>
                <button id="no-btn" class="btn btn-outline btn-error px-8 rounded-full shadow-md text-lg bg-white">না</button>
            </div>
        </div>
    </div>

    <dialog id="success_modal" class="modal">
        <div class="modal-box text-center bg-white border-8 border-pink-100 rounded-[2.5rem]">
            <h3 class="font-black text-3xl text-pink-500 mb-2">আমি জানতাম! ❤️</h3>
            <p class="text-lg text-gray-500 italic">"জাহিদ এখন পৃথিবীর সবচেয়ে সুখী মানুষ!"</p>
            <div class="modal-action justify-center">
                <form method="dialog">
                    <button class="btn btn-secondary rounded-full px-10">Love You Too!</button>
                </form>
            </div>
        </div>
    </dialog>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const displayText = document.getElementById('display-text');
        const container = document.querySelector('.interaction-area');

        const messages = [
            "এটা কি 'না'? একদমই না! 🙅‍♂️",
            "শিওর তো? 😮",
            "ভেবে দেখো... 😢",
            "আরেকবার! 🧐",
            "এমন করো না! 💔",
            "ভুল বাটন! ☝️",
            "উফফ! পারলা না 🙅‍♂️",
            "তুমি কি সত্যি নিশ্চিত? 😮",
            "জাহিদ কিন্তু খুব দুঃখ পাবে... 😢",
            "আবার ভেবে দেখো! 🧐",
            "আমার সাথে এমনটা করো না! 💔",
            "তুমি ভুল বাটনে ক্লিক করছো! ☝️",
            "একটু দয়া করো প্রিয়! ✨",
            "না বলা বারণ! 🚫"
        ];

        function moveButton() {
            if (!noBtn.classList.contains('moved')) {
                noBtn.classList.add('moved');
            }
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            displayText.innerText = randomMsg;

            const rect = container.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            const newLeft = Math.random() * (rect.width - btnWidth);
            const newTop = Math.random() * (rect.height - btnHeight);

            noBtn.style.left = `${newLeft}px`;
            noBtn.style.top = `${newTop}px`;
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // 'Yes' বাটনের জন্য আপডেট করা লজিক
        // yesBtn.addEventListener('click', () => {
        //     // ১. অটোমেটিক ইমেইল নোটিফিকেশন পাঠানো (Formspree)
        //     fetch("https://formspree.io/f/mwvreqng", {
        //         method: "POST",
        //         body: JSON.stringify({
        //             subject: "Love Confirmed! ❤️",
        //             message: "অভিনন্দন জাহিদ! সে 'হ্যাঁ' বাটনে ক্লিক করেছে। 🥰"
        //         }),
        //         headers: {
        //             'Accept': 'application/json',
        //             'Content-Type': 'application/json'
        //         }
        //     }).then(response => {
        //         console.log("Notification Sent!");
        //     }).catch(error => {
        //         console.log("Error sending notification.");
        //     });

        //     // ২. স্ক্রিনে সেলিব্রেশন
        //     confetti({
        //         particleCount: 150,
        //         spread: 70,
        //         origin: { y: 0.6 }
        //     });

        //     // ৩. মডাল দেখানো
        //     success_modal.showModal();
        // });
        yesBtn.addEventListener('click', () => {
    // কনফেটি সেলিব্রেশন
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
    });

    // আপনার ফোন নম্বর (Country code সহ)
    const myNumber = "01516569041"; 
    const text = "আমি তোমাকে ভালোবাসি! 🥰❤️";

    // সাকসেস মেসেজ দেখানো
    success_modal.showModal();

    // ৩ সেকেন্ড পর সরাসরি হোয়াটসঅ্যাপে নিয়ে যাবে
    setTimeout(() => {
        window.location.href = `https://api.whatsapp.com/send?phone=${myNumber}&text=${encodeURIComponent(text)}`;
    }, 2500);
});
    </script>
</body>

</html>
